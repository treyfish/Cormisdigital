<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    background: #0a0a0a;
    font-family: 'Inter', sans-serif;
    color: #fff;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
  }
  .dots {
    position: absolute;
    inset: 0;
    background-image: radial-gradient(rgba(55, 138, 221, 0.35) 1.5px, transparent 1.5px);
    background-size: 34px 34px;
    -webkit-mask-image: radial-gradient(ellipse 75% 85% at 72% 50%, black 0%, transparent 75%);
  }
  .glow {
    position: absolute;
    width: 900px;
    height: 700px;
    right: -200px;
    top: -150px;
    background: radial-gradient(ellipse, rgba(55, 138, 221, 0.13) 0%, transparent 70%);
  }
  .content { position: relative; padding: 0 90px; max-width: 980px; }
  .logo { display: flex; align-items: center; gap: 16px; margin-bottom: 52px; }
  .wordmark { display: flex; flex-direction: column; line-height: 1; }
  .cromis { font-family: 'Fraunces', Georgia, serif; font-weight: 600; font-size: 34px; letter-spacing: 0.01em; }
  .digital { font-size: 15px; font-weight: 600; letter-spacing: 0.32em; color: #00c6ff; margin-top: 4px; }
  h1 {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 600;
    font-size: 76px;
    line-height: 1.05;
    letter-spacing: -0.02em;
    margin-bottom: 32px;
  }
  h1 .accent { color: #378ADD; }
  .sub { font-size: 26px; color: #9a9a9a; font-weight: 400; line-height: 1.5; }
  .bar {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 8px;
    background: linear-gradient(90deg, #378ADD, #00c6ff);
  }
</style>
</head>
<body>
  <div class="dots"></div>
  <div class="glow"></div>
  <div class="content">
    <div class="logo">
      <svg width="74" height="44" viewBox="0 0 120 32" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="wA" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#00c6ff"/><stop offset="100%" stop-color="#0072ff"/>
          </linearGradient>
          <linearGradient id="wB" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#0050aa"/><stop offset="100%" stop-color="#0072ff"/>
          </linearGradient>
        </defs>
        <path d="M0,9 C8,3 22,3 30,9 C38,15 52,15 60,9 C68,3 82,3 90,9 C98,15 112,15 120,9" fill="none" stroke="url(#wA)" stroke-width="3" stroke-linecap="round"/>
        <path d="M0,23 C8,29 22,29 30,23 C38,17 52,17 60,23 C68,29 82,29 90,23 C98,17 112,17 120,23" fill="none" stroke="url(#wB)" stroke-width="3" stroke-linecap="round" opacity="0.55"/>
      </svg>
      <div class="wordmark">
        <span class="cromis">Cromis</span>
        <span class="digital">DIGITAL</span>
      </div>
    </div>
    <h1>Websites and AI systems<br><span class="accent">that catch every lead.</span></h1>
    <div class="sub">Built for local service businesses across Florida.</div>
  </div>
  <div class="bar"></div>
</body>
</html>
